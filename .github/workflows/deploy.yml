name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Firebase + Cloudinary config into HTML
        env:
          FIREBASE_API_KEY:            ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:        ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:             ${{ secrets.FIREBASE_APP_ID }}
          CLOUDINARY_CLOUD_NAME:       ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET:    ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
        run: |
          python3 << 'PYEOF'
          import os, re

          cfg = """<script>
          window.FIREBASE_CONFIG={
            apiKey:"{FIREBASE_API_KEY}",
            authDomain:"{FIREBASE_AUTH_DOMAIN}",
            projectId:"{FIREBASE_PROJECT_ID}",
            storageBucket:"{FIREBASE_STORAGE_BUCKET}",
            messagingSenderId:"{FIREBASE_MESSAGING_SENDER_ID}",
            appId:"{FIREBASE_APP_ID}"
          };
          window.CLOUDINARY_CONFIG={
            cloud_name:"{CLOUDINARY_CLOUD_NAME}",
            upload_preset:"{CLOUDINARY_UPLOAD_PRESET}"
          };
          </script>""".format(
            FIREBASE_API_KEY            = os.environ['FIREBASE_API_KEY'],
            FIREBASE_AUTH_DOMAIN        = os.environ['FIREBASE_AUTH_DOMAIN'],
            FIREBASE_PROJECT_ID         = os.environ['FIREBASE_PROJECT_ID'],
            FIREBASE_STORAGE_BUCKET     = os.environ['FIREBASE_STORAGE_BUCKET'],
            FIREBASE_MESSAGING_SENDER_ID= os.environ['FIREBASE_MESSAGING_SENDER_ID'],
            FIREBASE_APP_ID             = os.environ['FIREBASE_APP_ID'],
            CLOUDINARY_CLOUD_NAME       = os.environ['CLOUDINARY_CLOUD_NAME'],
            CLOUDINARY_UPLOAD_PRESET    = os.environ['CLOUDINARY_UPLOAD_PRESET'],
          )

          for fname in ['constructor.html', 'card.html']:
            with open(fname, 'r') as f:
              html = f.read()
            html = html.replace('</head>', cfg + '</head>', 1)
            with open(fname, 'w') as f:
              f.write(html)
            print(f'✓ Injected config into {fname}')
          PYEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
