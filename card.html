<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Открытка для тебя 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1c0f14;--rose:#d4496a;--gold:#c8973a;--blush:#fdf0f3;--petal:#f9dde4;--mist:#8a5d6a;--white:#fff;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:#12060c;color:var(--white);min-height:100vh;overflow-x:hidden;}
#loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#loading-screen.hide{display:none;}
.spinner{width:40px;height:40px;border:3px solid rgba(212,73,106,.3);border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:rgba(255,255,255,.45);font-family:'Jost',sans-serif;}
#error-screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
#error-screen.on{display:flex;}
.err-emoji{font-size:52px;margin-bottom:20px;}
.err-title{font-family:'Playfair Display',serif;font-size:28px;font-style:italic;color:var(--white);margin-bottom:10px;}
.err-sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:28px;line-height:1.6;}
.err-btn{background:var(--rose);color:white;border:none;border-radius:50px;padding:14px 32px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
#card-screen{display:none;min-height:100vh;flex-direction:column;align-items:center;position:relative;overflow:hidden;padding:0 0 72px;}
#card-screen.on{display:flex;}
.card-glow{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse 60% 50% at 15% 25%,rgba(180,30,60,.14),transparent),radial-gradient(ellipse 50% 60% at 85% 75%,rgba(212,73,106,.09),transparent);}
#petal-canvas{position:fixed;inset:0;pointer-events:none;z-index:2;}
.card-inner{width:100%;max-width:460px;padding:52px 22px 0;display:flex;flex-direction:column;align-items:center;position:relative;z-index:3;}
.whisper{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:22px;animation:fadeUp .7s ease .2s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.g-card{width:100%;background:white;border-radius:24px;overflow:hidden;box-shadow:0 40px 90px rgba(0,0,0,.6);animation:cardPop 1s cubic-bezier(.22,1,.36,1) .35s both;}
@keyframes cardPop{from{opacity:0;transform:scale(.78) translateY(40px);}to{opacity:1;transform:scale(1) translateY(0);}}
.g-banner{height:200px;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;overflow:hidden;}
.g-banner.has-cover{font-size:0;}
.g-banner img.cover-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.g-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(130deg,rgba(255,255,255,.1),transparent 55%);}
.t-roses {background:linear-gradient(145deg,#8b1a3a,#c94070,#f4a6bb);}
.t-spring{background:linear-gradient(145deg,#1e5c2e,#3aaa5c,#9de6b0);}
.t-night {background:linear-gradient(145deg,#0a0a1f,#1a1a4f,#4060b0);}
.t-golden{background:linear-gradient(145deg,#3d2000,#a0640a,#f0c060);}
.g-body{padding:26px 28px 30px;}
.g-to{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mist);margin-bottom:4px;}
.g-name{font-family:'Playfair Display',serif;font-size:36px;font-weight:400;font-style:italic;color:var(--ink);line-height:1.1;margin-bottom:16px;}
.g-msg{font-size:14px;line-height:1.9;color:#6b4050;font-weight:300;margin-bottom:20px;border-left:2px solid var(--petal);padding-left:14px;}
.g-from{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--rose);text-align:right;}
.mem-box{width:100%;margin-top:24px;text-align:center;animation:fadeUp .7s ease 1.7s both;opacity:0;}
.mem-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px;}
.mem-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.22);border-radius:50px;padding:13px 26px;font-family:'Jost',sans-serif;font-size:13px;color:rgba(255,255,255,.9);cursor:pointer;transition:all .3s;}
.mem-btn:hover{background:rgba(212,73,106,.25);border-color:var(--rose);color:white;}
.speed-box{display:flex;align-items:center;gap:10px;margin-top:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:10px 18px;width:100%;}
.speed-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);white-space:nowrap;}
input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:rgba(255,255,255,.18);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--rose);cursor:pointer;box-shadow:0 2px 8px rgba(212,73,106,.5);}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--rose);cursor:pointer;border:none;}
.speed-val{font-size:11px;color:rgba(255,255,255,.55);min-width:24px;text-align:right;}
.make-own{margin-top:20px;animation:fadeUp .7s ease 2.6s both;opacity:0;}
.make-own a{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:11px 22px;font-family:'Jost',sans-serif;font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;transition:all .3s;}
.make-own a:hover{background:rgba(212,73,106,.15);border-color:rgba(212,73,106,.4);color:rgba(255,255,255,.8);}
#rain-layer{position:fixed;inset:0;pointer-events:none;z-index:20;display:none;}
#rain-layer.on{display:block;pointer-events:all;}
.fp{position:absolute;width:88px;height:88px;border-radius:12px;object-fit:cover;border:2.5px solid white;box-shadow:0 8px 22px rgba(0,0,0,.45);cursor:pointer;top:-110px;opacity:0;}
.fp.landed{transition:box-shadow .2s,transform .2s;}
.fp.landed:hover{box-shadow:0 12px 32px rgba(212,73,106,.55)!important;transform:scale(1.08) rotate(0deg)!important;}
#lightbox{position:fixed;inset:0;background:rgba(10,4,8,.88);backdrop-filter:blur(12px);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s;}
#lightbox.on{opacity:1;pointer-events:all;}
.lb{background:white;border-radius:22px;max-width:340px;width:100%;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);}
.lb img{width:100%;height:200px;object-fit:cover;display:block;}
.lb-body{padding:22px 26px 26px;text-align:center;}
.lb-text{font-family:'Playfair Display',serif;font-size:19px;font-style:italic;color:var(--ink);line-height:1.65;margin-bottom:18px;}
.lb-close{background:var(--rose);color:white;border:none;border-radius:50px;padding:10px 28px;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;}
</style>
<script>window.FIREBASE_CONFIG={apiKey:"AIzaSyBLLQjStD1r5fT3AYe6jS5C9B5g9rWxs54",authDomain:"for-you-6d3a4.firebaseapp.com",projectId:"for-you-6d3a4",storageBucket:"for-you-6d3a4.firebasestorage.app",messagingSenderId:"648486819711",appId:"1:648486819711:web:09393a16e1ff1227ec2c4a"};window.CLOUDINARY_CONFIG={cloud_name:"dydgkgvmm",upload_preset:"pozdravlenie"};</script></head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">Загружаем открытку…</div>
</div>

<div id="error-screen">
  <div class="err-emoji">💔</div>
  <div class="err-title">Открытка не найдена</div>
  <div class="err-sub">Ссылка неверная или открытка была удалена.<br>Попроси отправителя создать новую.</div>
  <button class="err-btn" onclick="window.location.href='index.html'">Создать свою открытку</button>
</div>

<div id="card-screen">
  <div class="card-glow"></div>
  <canvas id="petal-canvas"></canvas>
  <div class="card-inner">
    <div class="whisper">Открытка для тебя 💌</div>
    <div class="g-card">
      <div class="g-banner t-roses" id="g-banner">
        <img class="cover-img" id="g-cover" src="" alt="">
        <span id="g-emoji">🌷</span>
      </div>
      <div class="g-body">
        <div class="g-to">Для:</div>
        <div class="g-name" id="g-name">—</div>
        <div class="g-msg" id="g-msg">—</div>
        <div class="g-from" id="g-from">—</div>
      </div>
    </div>

    <div class="mem-box" id="mem-box" style="display:none">
      <div class="mem-label">✦ у вас есть совместные воспоминания ✦</div>
      <button class="mem-btn" id="mem-btn" onclick="startRain()">🌸 Открыть наши моменты</button>
      <div class="speed-box">
        <span class="speed-label">🌧 Скорость</span>
        <input type="range" id="speed-sl" min="1" max="5" value="3"
               oninput="rainSpeed=+this.value;document.getElementById('speed-val').textContent='×'+this.value">
        <span class="speed-val" id="speed-val">×3</span>
      </div>
    </div>

    <div class="make-own"><a href="index.html">💌 Создать такую же открытку</a></div>
  </div>
</div>

<div id="rain-layer"></div>

<div id="lightbox" onclick="if(event.target===this)closeLB()">
  <div class="lb">
    <img id="lb-img" src="" alt="">
    <div class="lb-body">
      <p class="lb-text" id="lb-text"></p>
      <button class="lb-close" onclick="closeLB()">Закрыть</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = {'8march':'🌷','birthday':'🎂','love':'💌','newyear':'🥂'};
let cardData  = null;
let rainSpeed = 3;
let rainTimer = null;
let rainCount = 0;

// Load card after Firebase is ready
function onConfigLoaded() {
  const cfg = window.FIREBASE_CONFIG;
  if (!cfg || cfg.apiKey === 'ВСТАВЬ_СЮДА') { showError(); return; }

  // Dynamic Firebase import
  const s = document.createElement('script');
  s.type = 'module';
  s.textContent = `
    import { initializeApp }       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    const app = initializeApp(window.FIREBASE_CONFIG);
    const db  = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const cardId = params.get('id');
    if (!cardId) { window.showError(); }
    else {
      getDoc(doc(db, 'cards', cardId))
        .then(snap => { if (!snap.exists()) window.showError(); else window.renderCard(snap.data()); })
        .catch(() => window.showError());
    }
  `;
  document.head.appendChild(s);
}

function showError() {
  document.getElementById('loading-screen').classList.add('hide');
  document.getElementById('error-screen').classList.add('on');
}

function renderCard(d) {
  cardData = d;
  document.title = 'Открытка для ' + d.name + ' 💌';

  const banner = document.getElementById('g-banner');
  banner.className = 'g-banner t-' + d.theme;

  if (d.coverUrl) {
    document.getElementById('g-cover').src = d.coverUrl;
    banner.classList.add('has-cover');
    document.getElementById('g-emoji').style.display = 'none';
  } else {
    document.getElementById('g-emoji').textContent = EMOJIS[d.occasion] || '🌷';
  }

  document.getElementById('g-name').textContent = d.name;
  document.getElementById('g-msg').textContent  = '"' + d.msg + '"';
  document.getElementById('g-from').textContent = '— ' + d.from;

  if (d.photos && d.photos.length) {
    document.getElementById('mem-box').style.display = 'block';
  }

  document.getElementById('loading-screen').classList.add('hide');
  document.getElementById('card-screen').classList.add('on');
  setTimeout(initPetals, 500);
}

// ── Petals ────────────────────────────────────────────
function initPetals() {
  const cvs = document.getElementById('petal-canvas');
  const ctx  = cvs.getContext('2d');
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
  window.addEventListener('resize', () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; });
  const chars = ['🌸','🌹','✿','❀','🌺','💮','🌷'];
  const pts = Array.from({length:20}, () => ({
    x: Math.random()*cvs.width, y: -Math.random()*cvs.height,
    vy: .35+Math.random()*.65,  vx: (Math.random()-.5)*.35,
    rot: Math.random()*360,     vr: (Math.random()-.5)*1.4,
    sz: 13+Math.random()*10,    ch: chars[Math.floor(Math.random()*chars.length)],
    a: .35+Math.random()*.45
  }));
  (function draw() {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    pts.forEach(p => {
      ctx.save(); ctx.globalAlpha = p.a;
      ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
      ctx.font = p.sz + 'px serif'; ctx.fillText(p.ch, -p.sz/2, p.sz/2);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (p.y > cvs.height + 20) { p.y = -20; p.x = Math.random() * cvs.width; }
    });
    requestAnimationFrame(draw);
  })();
}

// ── Rain ──────────────────────────────────────────────
function startRain() {
  if (!cardData?.photos?.length) return;
  document.getElementById('mem-btn').textContent = '🌸 Снова';
  if (rainTimer) { clearInterval(rainTimer); rainTimer = null; }
  const layer = document.getElementById('rain-layer');
  layer.classList.add('on'); layer.innerHTML = '';
  rainCount = 0;
  const interval = Math.round(550 / rainSpeed);
  function go() {
    if (rainCount >= 40) { clearInterval(rainTimer); rainTimer = null; return; }
    dropOne(); rainCount++;
  }
  go(); rainTimer = setInterval(go, interval);
}

function dropOne() {
  const layer  = document.getElementById('rain-layer');
  const photos = cardData.photos;
  const p      = photos[rainCount % photos.length];
  const img    = document.createElement('img');
  img.className = 'fp';
  const leftVw = 5 + Math.random() * 82;
  const rotDeg = Math.random() * 28 - 14;
  img.style.left = leftVw + 'vw';
  img.style.transform = 'rotate(' + rotDeg + 'deg) scale(0.85)';
  const dur   = (1.8 + Math.random() * 1.4) / Math.sqrt(rainSpeed);
  const durMs = dur * 1000;
  img.addEventListener('click', () => openLB(p));
  layer.appendChild(img);
  img.src = p.url;

  const startTime = performance.now();
  const startTop  = -110;
  const endTop    = window.innerHeight - 80 - Math.random() * 200;

  function fall(now) {
    const t    = Math.min((now - startTime) / durMs, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    img.style.top     = (startTop + (endTop - startTop) * ease) + 'px';
    img.style.opacity = t < 0.06 ? t / 0.06 : 1;
    if (t < 1) { requestAnimationFrame(fall); return; }
    img.style.top       = endTop + 'px';
    img.style.opacity   = '1';
    img.style.transform = 'rotate(' + rotDeg + 'deg)';
    img.classList.add('landed');
    setTimeout(() => {
      let fade = 1;
      const fi = setInterval(() => {
        fade -= 0.05; img.style.opacity = Math.max(0, fade);
        if (fade <= 0) { clearInterval(fi); img.remove(); }
      }, 50);
    }, 14000);
  }
  requestAnimationFrame(fall);
}

function openLB(photo) {
  document.getElementById('lb-img').src   = photo.url;
  document.getElementById('lb-text').textContent = photo.wish || (cardData && cardData.msg) || 'Ты особенная ✨';
  document.getElementById('lightbox').classList.add('on');
}
function closeLB() { document.getElementById('lightbox').classList.remove('on'); }
</script>


</body>
</html>
