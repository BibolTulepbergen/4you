<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С любовью — Создать открытку</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1c0f14;--rose:#d4496a;--gold:#c8973a;--mist:#8a5d6a;--white:#fff;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--ink);color:var(--white);min-height:100vh;overflow-x:hidden;}
.bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;}
.blob1{width:500px;height:500px;background:#d4496a;top:-100px;right:-150px;}
.blob2{width:380px;height:380px;background:#c8973a;bottom:-80px;left:-100px;}
.blob3{width:300px;height:300px;background:#8b1a3a;top:40%;left:30%;}
.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:0 0 80px;}
.hero{width:100%;max-width:540px;padding:56px 28px 0;text-align:center;}
.eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:22px;display:flex;align-items:center;justify-content:center;gap:12px;}
.eyebrow::before,.eyebrow::after{content:'';height:1px;width:36px;background:var(--gold);opacity:.5;}
h1{font-family:'Playfair Display',serif;font-size:clamp(40px,10vw,66px);font-weight:400;line-height:1.06;margin-bottom:14px;}
h1 em{font-style:italic;color:#f4a6bb;}
.sub{font-size:14px;color:rgba(255,255,255,.45);font-weight:300;margin-bottom:52px;line-height:1.6;}
.feat{width:calc(100% - 56px);max-width:540px;background:linear-gradient(150deg,#5c1a30,#3a0d1d);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:30px 28px;cursor:pointer;position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s;animation:rise .6s cubic-bezier(.22,1,.36,1) .1s both;}
.feat::before{content:'';position:absolute;top:-50px;right:-50px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(212,73,106,.4),transparent 70%);}
.feat:hover{transform:translateY(-5px);box-shadow:0 28px 64px rgba(212,73,106,.35);}
.feat.sel{border-color:var(--rose);box-shadow:0 0 0 2px var(--rose),0 20px 52px rgba(212,73,106,.3);}
.feat-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(212,73,106,.25);border:1px solid rgba(212,73,106,.5);border-radius:20px;padding:4px 14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#f4a6bb;margin-bottom:14px;}
.feat-title{font-family:'Playfair Display',serif;font-size:30px;font-style:italic;color:white;margin-bottom:6px;}
.feat-desc{font-size:13px;color:rgba(255,255,255,.5);font-weight:300;max-width:300px;}
.feat-emoji{position:absolute;right:28px;top:28px;font-size:48px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.35));}
.feat-check{position:absolute;right:28px;bottom:24px;width:24px;height:24px;background:var(--rose);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:13px;}
.feat.sel .feat-check{display:flex;}
.sec-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin:32px 28px 14px;width:100%;max-width:540px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:calc(100% - 56px);max-width:540px;animation:rise .6s cubic-bezier(.22,1,.36,1) .25s both;}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:20px 12px;cursor:pointer;text-align:center;transition:all .25s;position:relative;}
.card:hover{background:rgba(212,73,106,.15);border-color:rgba(212,73,106,.4);}
.card.sel{background:rgba(212,73,106,.18);border-color:var(--rose);box-shadow:0 0 0 1.5px var(--rose);}
.card-emoji{font-size:26px;display:block;margin-bottom:8px;}
.card-title{font-size:12px;color:rgba(255,255,255,.85);font-weight:500;}
.card-date{font-size:10px;color:rgba(255,255,255,.35);margin-top:3px;}
.card-check{position:absolute;top:8px;right:8px;width:18px;height:18px;background:var(--rose);border-radius:50%;font-size:10px;display:none;align-items:center;justify-content:center;}
.card.sel .card-check{display:flex;}
.cta{width:calc(100% - 56px);max-width:540px;margin-top:32px;animation:rise .6s cubic-bezier(.22,1,.36,1) .4s both;}
.btn-main{width:100%;padding:17px;background:var(--rose);color:white;border:none;border-radius:50px;font-family:'Jost',sans-serif;font-size:14px;font-weight:600;letter-spacing:.8px;cursor:pointer;box-shadow:0 10px 30px rgba(212,73,106,.45);transition:all .28s;}
.btn-main:hover{background:#bf3459;transform:translateY(-2px);box-shadow:0 16px 40px rgba(212,73,106,.55);}
@keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="bg"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>
<div class="page">
  <div class="hero">
    <div class="eyebrow">С любовью</div>
    <h1>Тронь её<br><em>до глубины</em><br>души</h1>
    <p class="sub">Создай поздравление, которое она запомнит навсегда</p>
  </div>
  <div class="feat sel" id="fc" onclick="pick8march()">
    <div class="feat-badge">✦ Главный праздник</div>
    <div class="feat-title">8 марта</div>
    <div class="feat-desc">Международный женский день — день, когда слова важнее цветов</div>
    <div class="feat-emoji">🌷</div>
    <div class="feat-check">✓</div>
  </div>
  <div class="sec-label">Или выбери другой повод</div>
  <div class="grid">
    <div class="card" onclick="pickOther('birthday',this)"><span class="card-emoji">🎂</span><div class="card-title">День рождения</div><div class="card-date">Особый день</div><div class="card-check">✓</div></div>
    <div class="card" onclick="pickOther('love',this)"><span class="card-emoji">💌</span><div class="card-title">Признание</div><div class="card-date">Просто так</div><div class="card-check">✓</div></div>
    <div class="card" onclick="pickOther('newyear',this)"><span class="card-emoji">🥂</span><div class="card-title">Новый год</div><div class="card-date">С праздником</div><div class="card-check">✓</div></div>
  </div>
  <div class="cta"><button class="btn-main" onclick="goNext()">Создать открытку →</button></div>
</div>
<script>
let chosen='8march';
function pick8march(){chosen='8march';document.getElementById('fc').classList.add('sel');document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));}
function pickOther(key,el){chosen=key;document.getElementById('fc').classList.remove('sel');document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}
function goNext(){sessionStorage.setItem('occasion',chosen);window.location.href='constructor.html';}
</script>
</body>
</html>
